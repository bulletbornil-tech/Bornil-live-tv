<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV - Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">📺 IPTV LIVE</div>
  <input id="search" placeholder="Search channels..." />
</header>

<section class="player">
  <video id="video" controls autoplay></video>
  <div id="now">Select a channel</div>
</section>

<section class="filters">
  <button onclick="filter('All')">All</button>
  <button onclick="filter('Sports')">Sports</button>
  <button onclick="filter('Movies')">Movies</button>
  <button onclick="filter('Bangladesh')">Bangladesh</button>
  <button onclick="filter('Cartoon')">Cartoon</button>
  <button onclick="filter('Music')">Music</button>
</section>

<main id="list" class="grid"></main>

<script src="app.js"></script>
</body>
</html>
